version: '3.8'

services:
  # Servicio de Base de Datos (MariaDB)
  db:
    image: mariadb:10.11
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=autosqp
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    ports:
      - "3306:3306"

  # Servicio Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/autosqp
      # Aquí puedes agregar otras variables si están en tu .env, o usar env_file:
      # - SECRET_KEY=tu_clave_secreta_aqui
      # env_file:
      #   - ./backend/.env

      # Servicio Frontend (React/Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
