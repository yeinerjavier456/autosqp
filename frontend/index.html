<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <base href="%BASE_URL%" />
  <link rel="icon" href="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22%230f172a%22/%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2254%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22Arial%2C%20sans-serif%22%20font-size%3D%2230%22%20font-weight%3D%22700%22%20fill%3D%22%23ffffff%22%3EA%3C/text%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario de vehículos</title>
  <meta name="description" content="Consulta carros y camionetas disponibles." />
  <meta property="og:title" content="Inventario de vehículos" />
  <meta property="og:description" content="Consulta carros y camionetas disponibles." />
  <meta property="og:type" content="website" />
  <meta name="twitter:title" content="Inventario de vehículos" />
  <meta name="twitter:description" content="Consulta carros y camionetas disponibles." />
  <script>
    (function () {
      try {
        var hostname = String(window.location.hostname || '').trim().toLowerCase();
        if (!hostname || hostname === 'localhost' || hostname === '127.0.0.1') return;
        var normalized = hostname.replace(/^www\./, '');
        var label = normalized.split('.')[0];
        if (label) {
          document.title = label;
          [
            ['meta[name="description"]', 'content', 'Consulta carros y camionetas disponibles en ' + label + '.'],
            ['meta[property="og:title"]', 'content', label],
            ['meta[property="og:description"]', 'content', 'Consulta carros y camionetas disponibles en ' + label + '.'],
            ['meta[name="twitter:title"]', 'content', label],
            ['meta[name="twitter:description"]', 'content', 'Consulta carros y camionetas disponibles en ' + label + '.']
          ].forEach(function (item) {
            var meta = document.querySelector(item[0]);
            if (meta) meta.setAttribute(item[1], item[2]);
          });

          var firstLetter = label.slice(0, 1).toUpperCase();
          var svg = [
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">',
            '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#2563eb"/></linearGradient></defs>',
            '<rect width="64" height="64" rx="16" fill="url(#g)"/>',
            '<text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">' + firstLetter + '</text>',
            '</svg>'
          ].join('');
          var faviconHref = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
          ['icon', 'shortcut icon', 'apple-touch-icon'].forEach(function (rel) {
            var link = document.querySelector('link[rel="' + rel + '"]');
            if (!link) {
              link = document.createElement('link');
              link.setAttribute('rel', rel);
              document.head.appendChild(link);
            }
            link.setAttribute('href', faviconHref);
          });
        }
      } catch (error) {
        console.warn('Unable to set public page title from hostname.', error);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
